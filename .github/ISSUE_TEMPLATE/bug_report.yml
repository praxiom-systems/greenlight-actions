name: Bug Report
description: Report a problem with Greenlight Actions
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the details below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: repo-visibility
    attributes:
      label: Repository Visibility
      description: Is the affected repository public or private?
      options:
        - Public
        - Private
    validations:
      required: true

  - type: textarea
    id: workflow
    attributes:
      label: Workflow File
      description: Paste the relevant portion of your workflow YAML (especially the job with `environment: greenlight`)
      render: yaml

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help (screenshots, links to workflow runs, etc.)
