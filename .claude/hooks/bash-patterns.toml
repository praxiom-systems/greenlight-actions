# Bash command validation patterns for Claude Code PreToolUse hook
# Patterns are regular expressions matched against commands
#
# Source: https://github.com/amulya-labs/ai-dev-foundry
# License: MIT (https://opensource.org/licenses/MIT)
#
# Categories:
#   [deny.*]  - Always block, no user override (catastrophic/irreversible)
#   [ask.*]   - Prompt user for confirmation (risky but sometimes needed)
#   [allow.*] - Auto-approve (safe operations)
#
# Evaluation order: deny -> ask -> allow -> ask (if no match)

# =============================================================================
# DENY PATTERNS - Truly catastrophic, never allow
# =============================================================================

[deny.privilege_escalation]
description = "Commands that escalate privileges"
patterns = [
    "^sudo ",
    "^su ",
    "^doas ",
    # Absolute path bypass: blocks '/usr/bin/sudo bash' which starts with '/' not 'sudo'
    "/usr/bin/sudo ",
    "/bin/su ",
]

[deny.catastrophic_deletion]
description = "File deletion that could destroy system or all user data"
patterns = [
    "^rm -rf /$",
    "^rm -rf /\\*",
    "^rm -rf ~",
    "^rm -rf \\.$",
    "^rm -rf \\*$",
    " rm -rf /$",
    " rm -rf /\\*",
]

[deny.disk_destruction]
description = "Direct disk/partition manipulation"
patterns = [
    "^dd if=.*/dev/",
    "^dd of=/dev/",
    "^mkfs\\.",
    "^fdisk ",
    "^parted ",
]

[deny.system_shutdown]
description = "System shutdown/reboot commands"
patterns = [
    "^reboot",
    "^shutdown",
    "^poweroff",
    "^halt$",
    "^init 0",
    "^init 6",
]

[deny.malicious_patterns]
description = "Known malicious patterns"
patterns = [
    ":.*\\(\\).*\\{.*:\\|",    # Fork bombs
    "^history -c",              # History destruction
    "^history -w /dev/null",
]

[deny.dangerous_chaining]
description = "Dangerous command combinations via chaining operators"
# NOTE: These patterns are checked against the FULL command before splitting.
# The validator first checks deny patterns on raw input, then splits on ;/&&/||.
# Some rm patterns overlap with catastrophic_deletion for defense-in-depth.
patterns = [
    # Chained catastrophic rm -rf (root, home, all)
    ";\\s*rm -rf /$",
    "&&\\s*rm -rf /$",
    "\\|\\|\\s*rm -rf /$",
    ";\\s*rm -rf ~",
    "&&\\s*rm -rf ~",
    "\\|\\|\\s*rm -rf ~",
    ";\\s*rm -rf /\\*",
    "&&\\s*rm -rf /\\*",
    "\\|\\|\\s*rm -rf /\\*",
    # Chained privilege escalation - catches "safe_cmd && sudo dangerous"
    ";\\s*sudo ",
    "&&\\s*sudo ",
    "\\|\\|\\s*sudo ",
]

# =============================================================================
# ASK PATTERNS - Risky but useful, prompt for confirmation
# =============================================================================

[ask.git_destructive]
description = "Git operations that rewrite history or are hard to undo"
patterns = [
    "^git push --force",
    "^git push -f",
    "^git reset --hard",
    "^git clean -fd",
    # Simple 'git rebase <branch>' is standard workflow and locally reversible;
    # only prompt for interactive rebase (rewrites history in complex ways) and
    # --exec (runs arbitrary shell commands per-commit during rebase)
    "^git rebase .*(-i |--interactive |--exec\\b|-i$|--interactive$)",
    # Use negative lookahead to avoid matching 'git merge-base' (read-only)
    # and any merge that includes 'origin/' anywhere in its arguments
    # (covers 'git merge origin/main', 'git merge --no-edit origin/main', etc.).
    # Destructive merge strategies (-X theirs/ours) always prompt even with origin/:
    # they silently discard local conflict resolutions, which is hard to undo.
    "^git merge(?!-base\\b)(?!.* origin/)",
    "^git merge.* -X (theirs|ours)",
    "^git merge.* --strategy-option[= ](theirs|ours)",
    "^git merge.* --squash",
    "^git cherry-pick",
    "^git revert",
    "^git stash drop",
    "^git stash clear",
    "^git branch -[dD]",
]

[ask.git_main_branch]
description = "Pushing directly to main/master branches"
patterns = [
    "^git push .* main$",
    "^git push .* master$",
    "^git push origin main",
    "^git push origin master",
]

[ask.package_publishing]
description = "Publishing packages to registries"
patterns = [
    "^npm publish",
    "^yarn publish",
    "^pnpm publish",
    "^cargo publish",
    "^poetry publish",
    "^twine upload",
    "^gh release create",
]

[ask.database_destructive]
description = "Database operations that destroy data"
patterns = [
    "^psql .*DROP",
    "^psql .*TRUNCATE",
    "^mysql .*DROP",
]

[ask.kubectl_exec_db_mutations]
description = "kubectl exec database commands with destructive SQL"
# NOTE: These are checked BEFORE the allow.kubernetes_exec_database patterns.
# Evaluation order (deny -> ask -> allow) provides defense-in-depth:
# destructive SQL is caught here, read-only queries fall through to allow.
patterns = [
    # SQL DDL/DML mutation keywords (case-insensitive via scoped (?i:...))
    # Note: (?i) as global flag mid-pattern is illegal in Python 3.12+
    "kubectl exec .* -- .*psql.*(?i:DROP|TRUNCATE|DELETE|INSERT|UPDATE|ALTER|CREATE|GRANT|REVOKE)",
    "kubectl exec .* -- .*mysql.*(?i:DROP|TRUNCATE|DELETE|INSERT|UPDATE|ALTER|CREATE|GRANT|REVOKE)",
    # psql running a script file (can't inspect contents)
    "kubectl exec .* -- .*psql.* -f ",
    "kubectl exec .* -- .*mysql.* < ",
]

[ask.github_mutations]
description = "GitHub CLI operations that modify state (irreversible or high-impact)"
patterns = [
    "^gh pr merge",
    "^gh pr close",
    "^gh pr ready",
    "^gh repo delete",
    "^gh repo archive",
    "^gh release delete",
    "^gh run cancel",
]

[ask.github_api_mutations]
description = "GitHub API calls that mutate state (POST, PUT, PATCH, DELETE)"
# Two variants per flag: flag-after-path ("gh api /path -X POST")
# and flag-before-path ("gh api -X POST /path"). The .* in the after-path
# variants requires at least one character between "api " and the flag,
# so the before-path forms genuinely need their own patterns.
# --method[= ] matches both "--method POST" and "--method=POST" (cobra CLI).
# -X(METHOD) matches curl-style combined form "-XPOST" (no space).
# Negative lookahead on POST-only variants excludes safe POST-only endpoints:
#   /replies  — posting a reply comment (safe; DELETE would prompt)
#   /reactions — adding a reaction (safe; DELETE would prompt)
#   issues/<N>/comments — posting a comment on an issue/PR (additive)
#   pulls/<N>/comments — posting an inline PR review comment (additive)
# pulls/<N>/reviews is intentionally NOT exempted: APPROVE and REQUEST_CHANGES
# submissions are high-impact workflow actions affecting merge eligibility.
# Use 'gh pr review --comment' (covered by the existing ^gh allow rule) for
# posting review-level comments without an approval decision.
# DELETE, PUT, PATCH always ask even for these endpoints,
# since deleting or modifying existing content is non-trivially destructive.
# Flag-after-path: lookahead at start excludes safe paths in the URL.
# Flag-before-path: lookahead after method excludes safe paths in trailing args.
patterns = [
    # POST with exemption for safe endpoints
    "^gh api (?!.*/(?:replies|reactions|issues/[^/]+/comments|pulls/[^/]+/comments)\\b).* -X POST",
    "^gh api (?!.*/(?:replies|reactions|issues/[^/]+/comments|pulls/[^/]+/comments)\\b).* -XPOST",
    "^gh api (?!.*/(?:replies|reactions|issues/[^/]+/comments|pulls/[^/]+/comments)\\b).* --method[= ]POST",
    "^gh api -X POST(?!.*/(?:replies|reactions|issues/[^/]+/comments|pulls/[^/]+/comments)\\b)",
    "^gh api -XPOST(?!.*/(?:replies|reactions|issues/[^/]+/comments|pulls/[^/]+/comments)\\b)",
    "^gh api --method[= ]POST(?!.*/(?:replies|reactions|issues/[^/]+/comments|pulls/[^/]+/comments)\\b)",
    # PUT, PATCH, DELETE always ask (no safe-endpoint exemption)
    "^gh api .* -X (PUT|PATCH|DELETE)",
    "^gh api .* -X(PUT|PATCH|DELETE)",
    "^gh api .* --method[= ](PUT|PATCH|DELETE)",
    "^gh api -X (PUT|PATCH|DELETE)",
    "^gh api -X(PUT|PATCH|DELETE)",
    "^gh api --method[= ](PUT|PATCH|DELETE)",
]

[ask.file_permissions]
description = "Broad file permission changes"
patterns = [
    "^chmod 777",
    "^chmod -R 777",
    "^chown ",
    "^chgrp ",
]

[ask.docker_control]
description = "Docker operations that stop/remove containers or clean up"
patterns = [
    "^docker system prune",
    "^docker volume prune",
