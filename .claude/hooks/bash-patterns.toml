    # k3s-helm (k3s bundled helm wrapper) — all commands prompt
    "^k3s-helm ",
    "^poetrun run k3s-helm ",
]

[ask.infrastructure_as_code]
description = "IaC tools that modify infrastructure"
patterns = [
