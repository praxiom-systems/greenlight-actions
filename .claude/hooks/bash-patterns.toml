    "^pulumi refresh",
    "^ansible-playbook",
]

[ask.cloud_mutations]
description = "Cloud CLI operations that create/modify/delete resources"
patterns = [
    "aws .* delete(\\s|$)",
    "aws .* remove(\\s|$)",
    "aws .* terminate(\\s|$)",
    "aws .* create(\\s|$)",
    "aws .* put(\\s|$)",
    "aws .* update(\\s|$)",
    "gcloud .* delete(\\s|$)",
    "gcloud .* create(\\s|$)",
    "az .* delete(\\s|$)",
    "az .* create(\\s|$)",
    # Supabase mutations
    "supabase .* (delete|reset|push|destroy)(\\s|$)",
    "supabase (db push|db reset|projects delete|functions delete)(\\s|$)",
]

[ask.process_control]
description = "Killing or stopping processes"
patterns = [
    "^kill ",
    "^killall",
    "^pkill",
]

[ask.service_management]
description = "Starting/stopping system services"
patterns = [
    "^systemctl start",
    "^systemctl stop",
    "^systemctl restart",
    "^systemctl enable",
    "^systemctl disable",
    "^systemctl mask",
    "^service .* start",
    "^service .* stop",
    "^service .* restart",
]

[ask.firewall]
description = "Firewall configuration"
patterns = [
    "^iptables",
    "^ip6tables",
    "^ufw ",
    "^firewall-cmd",
    "^nft ",
]

[ask.user_management]
description = "User, group, and cron management"
patterns = [
    "^crontab -e",
    "^crontab -r",
    "^crontab [^-]",
    "^visudo",
    "^passwd",
    "^useradd",
    "^userdel",
    "^usermod",
    "^groupadd",
    "^groupdel",
]

[ask.secrets_encryption]
description = "Encrypting secrets (decryption is allowed)"
patterns = [
    "^sops -e",
    "^sops --encrypt",
]

[ask.remote_access]
description = "Remote access and file transfer"
patterns = [
    "^ssh ",
    "^scp ",
    "^sftp ",
    "^ftp ",
    "^telnet ",
    "^nc -l",
]

[ask.file_deletion]
description = "File removal targeting absolute system paths (outside /tmp and current git repo)"
# Ask when rm targets absolute paths that are NOT:
#   /tmp/ or /var/tmp/  — temp files (covered by allow.temp_cleanup)
#   current git repo    — injected dynamically at runtime by _inject_git_root_patterns()
#                         when Claude is opened inside a git project (cwd has .git)
# Relative-path rm is allowed by allow.file_deletion_relative.
# Catastrophic rm (/, ~, *, .) is blocked by deny.catastrophic_deletion.
patterns = [
    # rm -r/-rf/-ri/-rfi + absolute path (not /tmp/ or /var/tmp/)
    "^rm\\s+(-[a-zA-Z]*r[a-zA-Z]*\\s+)+/(?!tmp/|var/tmp/)",
    # rm -f/-fi + absolute path (not /tmp/ or /var/tmp/)
    "^rm\\s+(-[a-zA-Z]*f[a-zA-Z]*\\s+)+/(?!tmp/|var/tmp/)",
    # bare rm + absolute path (not /tmp/ or /var/tmp/)
    "^rm\\s+/(?!tmp/|var/tmp/)",
]

[ask.dangerous_pipelines]
description = "Dangerous command combinations"
patterns = [
    "xargs.*rm",
    "xargs.*mv ",
    "xargs.*chmod",
    "xargs.*chown",
    "find.*-exec.*rm",
    "find.*-exec.*mv",
    "find.*-exec.*chmod",
    "find.*-delete",
]

[ask.code_execution]
description = "Arbitrary code execution patterns"
patterns = [
    # Pipe to shell - always ask regardless of source
    "\\| *sh( |$)",
    "\\| *bash( |$)",
    "\\| *zsh( |$)",
    # Remote download piped to interpreters (curl/wget + interpreter)
    "(curl|wget|http|fetch).*\\| *python[0-9.]*( |$)",
    "(curl|wget|http|fetch).*\\| *perl( |$)",
    "(curl|wget|http|fetch).*\\| *ruby( |$)",
    "(curl|wget|http|fetch).*\\| *node( |$)",
    "^eval ",
    "source /tmp/",
    "source /var/tmp/",
    "\\. /tmp/",
    "\\. /var/tmp/",
]

[ask.terminal_multiplexer_mutations]
description = "Terminal multiplexer operations that affect sessions or execute commands"
patterns = [
    # tmux session/window management
    "^tmux kill",
    "^tmux send-keys",
    "^tmux send-prefix",
    "^tmux respawn",
    # tmux shell execution - can run arbitrary commands
    "^tmux run-shell",
    "^tmux run ",
    "^tmux if-shell",
    "^tmux pipe-pane",
    # tmux new session/window (can specify commands)
    "^tmux new-session",
    "^tmux new-window",
    "^tmux split-window",
    "^tmux new ",
    # screen command injection
    "^screen -X ",
    "^screen -S .* -X",
    # screen can execute commands via -c or shell
    "^screen .*-c ",
]

[ask.group_switching]
description = "Commands executed with different group permissions"
patterns = [
    "^sg ",
    "^newgrp ",
]

[ask.package_manager_install]
description = "Package installation from remote registries (supply chain risk)"
# npm install bare (no package name) is intentionally excluded: it installs from
# local package.json and is a routine dev operation. Only registry installs prompt.
# Local-path installs (npm install ./pkg) and flag-only forms (npm install --save-dev)
# are also excluded via negative lookaheads.
patterns = [
    "^apt(-get)? install",
    "^apt(-get)? upgrade",
    "^pip install",
    "^npm install (?!\\.)(?!--)(.+)",
    "^yarn add",
    "^brew install",
    "^pacman -S ",
    "^cargo install ",
    "^gem install",
]

[ask.kernel_modules]
description = "Kernel module load/unload operations"
patterns = [
    "^insmod ",
    "^modprobe ",
    "^rmmod ",
]

# =============================================================================
# ALLOW PATTERNS - Safe operations, auto-approve
# =============================================================================

[allow.shell_constructs]
description = "Shell builtins and constructs"
patterns = [
    "^\\(",
    "^\\{",
    "^:$",
    "^true$",
    "^false$",
    "^sleep ",
    "^read ",
    "^wait",
    "^set ",
    "^return",
    "^exit",
    "^local ",
    "^bash -n ",
    "^test$",
    "^\\[$",
    # Loop/flow control builtins (bare keywords only)
    "^continue$",
    "^continue ",
    "^break$",
    "^break ",
    "^shift$",
    "^shift ",
    # Variable/function builtins
    "^unset ",
    "^readonly ",
    "^typeset ",
    "^let ",
    "^getopts ",
    # ^builtin with negative lookahead: block commands that have ask/deny guards.
    # Without this, 'builtin eval dangerous' would skip ask.code_execution's eval guard
    # because deny->ask->allow order means allow matches after ask misses (^eval pattern
    # won't fire on 'builtin eval ...'). The lookahead re-blocks the dangerous forms.
    "^builtin (?!eval|exec|source|mapfile)\\S",
    "^hash ",
    "^hash$",
    # Control flow keywords - only bare keywords are auto-allowed.
    # Full constructs (e.g., 'if condition; then cmd; fi') are split by
    # the validator, and the body commands are validated separately.
    # NOTE: Patterns with trailing space removed to prevent bypass like
    # 'then rm -rf /tmp/*' matching '^then '.
    "^for ",
    "^while ",
    "^until ",
    "^if ",
    "^elif ",
    "^else$",
    "^then$",
    "^fi$",
    "^fi;",
    "^do$",
    "^done$",
    "^done;",
    "^case ",
    "^esac$",
    "^esac;",
]

[allow.path_utilities]
description = "Path manipulation utilities"
patterns = [
    "^basename",
    "^dirname",
    "^realpath",
    "^readlink",
    "^mktemp",
    "^seq ",
    "^rev",
    "^yes ",
