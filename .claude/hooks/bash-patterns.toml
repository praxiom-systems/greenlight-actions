    "^kubectl cordon",
    "^kubectl uncordon",
    "^kubectl drain",
    "^kubectl run ",
    "^kubectl cp ",
    "^k3s kubectl apply",
    "^k3s kubectl create",
    "^k3s kubectl delete",
    "^k3s kubectl edit",
    "^k3s kubectl patch",
    "^k3s kubectl run ",
    "^k3s kubectl cp ",
]

[ask.helm_mutations]
description = "Helm operations that modify releases"
patterns = [
