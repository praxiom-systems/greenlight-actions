    # truncate with flags + explicit ./ prefix
    "^truncate\\s+(-[a-zA-Z]+\\s+)*\\./",
    # truncate on /tmp/ and /var/tmp/ (log files, test fixtures)
    "^truncate\\s+(-[a-zA-Z]+\\s+)*/tmp/",
    "^truncate\\s+(-[a-zA-Z]+\\s+)*/var/tmp/",
]

